<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deadstock Guitar Co.</title>
<meta name="description" content="A note from the bench." />
<meta name="theme-color" content="#121212" />
<meta name="robots" content="noindex, nofollow" />

<link rel="icon" type="image/svg+xml" href="../assets/icon.svg" />
<link rel="apple-touch-icon" href="../assets/icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
  /* ── Tokens ── */
  :root {
    --black:   #121212;
    --cream:   #F2E6C9;
    --amber:   #D28400;
    --walnut:  #3B2A1E;
    --steel:   #8C8F93;
    --display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    --serif:   "Cormorant Garamond", Georgia, serif;
    --mono:    ui-monospace, "SF Mono", "Menlo", monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--black);
    color: var(--cream);
    font-family: var(--display);
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
  }

  /* grain overlay */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none; z-index: 9999;
    opacity: 0.14; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.07  0 0 0 0 0.07  0 0 0 0 0.07  0 0 0 0.10 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ── Layout ── */
  .page {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 72px;
    max-width: 680px;
    margin: 0 auto;
  }

  /* ── Wordmark ── */
  .wordmark {
    margin-bottom: 52px;
    opacity: 0.9;
  }
  .wordmark img {
    height: 44px;
    width: auto;
    display: block;
    filter: brightness(0) invert(0.94) sepia(0.20) saturate(0.6);
  }

  /* ── Eyebrow ── */
  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 20px;
    text-align: center;
  }

  /* ── Headline ── */
  .headline {
    font-family: var(--display);
    font-size: clamp(36px, 8vw, 56px);
    font-weight: 600;
    line-height: 0.95;
    letter-spacing: -0.04em;
    text-align: center;
    color: var(--cream);
    margin-bottom: 10px;
  }
  .headline em {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--amber);
  }

  .subhead {
    font-size: 16px;
    font-weight: 400;
    line-height: 1.55;
    color: rgba(242,230,201,0.65);
    text-align: center;
    max-width: 34ch;
    margin: 0 auto 44px;
  }

  /* ── Video frame ── */
  .video-wrap {
    width: 100%;
    position: relative;
    aspect-ratio: 16 / 9;
    background: #0a0a0a;
    border: 1px solid rgba(242,230,201,0.10);
    overflow: hidden;
    margin-bottom: 44px;
  }

  /* YouTube iframe fills the container */
  .video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  /* Placeholder shown when no video is set */
  .video-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  .video-placeholder .play-ring {
    width: 64px; height: 64px;
    border: 1px solid rgba(242,230,201,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .video-placeholder .play-ring svg {
    color: rgba(242,230,201,0.4);
    margin-left: 4px;
  }
  .video-placeholder .label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(242,230,201,0.28);
  }

  /* ── Divider ── */
  .divider {
    width: 100%;
    height: 1px;
    background: rgba(242,230,201,0.10);
    margin-bottom: 44px;
  }

  /* ── Build note ── */
  .build-note {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
    margin-bottom: 52px;
  }
  .build-note .cell .k {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 10px;
  }
  .build-note .cell .v {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--cream);
    line-height: 1.3;
  }
  .build-note .cell .v em {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    color: rgba(242,230,201,0.7);
  }

  /* ── Video element fill ── */
  .video-wrap video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ── Footer sig ── */
  .sig {
    font-size: 13px;
    color: rgba(242,230,201,0.38);
    text-align: center;
    letter-spacing: 0.01em;
    line-height: 1.6;
  }
  .sig a {
    color: rgba(242,230,201,0.55);
    border-bottom: 1px solid rgba(242,230,201,0.2);
    padding-bottom: 1px;
    transition: color .2s, border-color .2s;
  }
  .sig a:hover { color: var(--amber); border-bottom-color: var(--amber); }

  @media (max-width: 480px) {
    .page { padding: 36px 20px 56px; }
    .wordmark { margin-bottom: 40px; }
    .wordmark img { height: 36px; }
    .build-note { grid-template-columns: 1fr 1fr; gap: 20px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="wordmark">
    <img src="../assets/wordmark.svg" alt="Deadstock Guitar Co." />
  </div>

  <div class="eyebrow">A note from the bench</div>

  <h1 class="headline">
    You just opened<br/><em>something real.</em>
  </h1>

  <p class="subhead">
    Every Deadstock leaves with a short message
    from the shop. This one's yours.
  </p>

  <!-- ═══════════════════════════════════════════════════════════
       VIDEO EMBED
       To add the video, replace VIDEO_ID_HERE with the YouTube
       video ID (the part after "watch?v=" in the URL).
       Example: https://www.youtube.com/watch?v=dQw4w9WgXcQ
                                                 ↑ this part
       ═══════════════════════════════════════════════════════════ -->
  <div class="video-wrap">
    
    <video controls playsinline>
      <source src="dog_video.mov" type="video/quicktime" />
      <source src="dog_video.mov" type="video/mp4" />
    </video>

  </div>
  <!-- ═══════════════════════════════════════════════════════════ -->

  <div class="divider"></div>

  <div class="build-note">
    <div class="cell">
      <div class="k">Built</div>
      <div class="v">Fortville,<br/>Indiana</div>
    </div>
    <div class="cell">
      <div class="k">Finish</div>
      <div class="v"><em>Nitrocellulose,<br/>by hand</em></div>
    </div>
    <div class="cell">
      <div class="k">Pickups</div>
      <div class="v">Handwound<br/>in-house</div>
    </div>
  </div>

  <p class="sig">
    Deadstock Guitar Co. · Fortville, Indiana<br/>
    <a href="https://deadstockguitars.com">deadstockguitars.com</a>
  </p>

</div>
</body>
</html>
